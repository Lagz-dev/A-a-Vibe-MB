<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Açaiteria do Morro Branco | Manutenção</title>

    <style>
        /* RESET */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
        }

        /* BODY */

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        /* CARD */

        .container {
            background: white;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 420px;
            width: 100%;
            animation: fadeUp 1s ease;
            position: relative;
            z-index: 2;
        }

        /* LOGO */

        .logo-img {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .logo-img img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #6a11cb;
            margin-bottom: 10px;
        }

        /* TEXTOS */

        h1 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #333;
        }

        p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.4;
            min-height: 24px;
        }

        /* LOADER */

        .loader {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .loader span {
            width: 10px;
            height: 10px;
            background: #6a11cb;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loader span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loader span:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* ERROR */

        .error-code {
            margin-top: 40px;
            font-size: 12px;
            color: #aaa;
        }

        /* PARTÍCULAS */

        .particle {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: float 10s linear infinite;
        }

        /* ANIMAÇÕES */

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* RESPONSIVO */

        @media (max-width:480px) {

            .container {
                padding: 28px;
                border-radius: 16px;
            }

            .logo {
                font-size: 22px;
            }

            h1 {
                font-size: 20px;
            }

            p {
                font-size: 14px;
            }

        }
    </style>

</head>

<body>

    <div class="container">

        <div class="logo-img">
            <img src="./IMG/logo.jpg" alt="Logo Açaiteria do Morro Branco">
        </div>

        <div class="logo">
            Açaiteria do Morro Branco
        </div>

        <h1>Esperando sua resposta!</h1>

        <p id="typing"></p>

        <div class="loader">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="error-code">Error 503 </br>
            Access blocked by Administrator: Luiz </br>
            System under maintenance</div>

    </div>

    <script>

        /* TEXTO DIGITANDO */

        const text = " Aguardando sua resposta para fecharmos nosso acordo e definirmos os detalhes. Por favor, entre em contato comigo para que possa te ajudar!";
        const typingElement = document.getElementById("typing");

        let index = 0;

        function typeEffect() {

            if (index < text.length) {

                typingElement.innerHTML += text.charAt(index);
                index++;

                setTimeout(typeEffect, 40);

            }

        }

        typeEffect();

        /* PARTÍCULAS */

        function createParticle() {

            const particle = document.createElement("div");
            particle.classList.add("particle");

            particle.style.left = Math.random() * window.innerWidth + "px";
            particle.style.animationDuration = (6 + Math.random() * 6) + "s";

            const size = (4 + Math.random() * 6) + "px";
            particle.style.width = size;
            particle.style.height = size;

            document.body.appendChild(particle);

            setTimeout(() => {

                particle.remove();

            }, 12000);

        }

        setInterval(createParticle, 350);

    </script>

</body>

</html>
